<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect</title>
  <style>
    body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; }
    #editor { width: 50%; height: 100%; box-sizing: border-box; }
    #editor textarea { width: 100%; height: 100%; box-sizing: border-box; background: #2a2a2a; color: #eee; font-family: monospace; font-size: 14px; padding: 12px; border: none; resize: none; outline: none; }
    #canvas-container { width: 50%; height: 100%; position: relative; }
    #wireframe-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    #wireframe-toggle .icon {
      width: 20px;
      height: 20px;
      opacity: 0.7;
    }
    #wireframe-toggle .switch {
      width: 36px;
      height: 20px;
      background: #555;
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
    }
    #wireframe-toggle .switch .knob {
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    #wireframe-toggle.on .switch { background: #777; }
    #wireframe-toggle.on .switch .knob { left: 18px; }
  </style>
</head>
<body>
  <div id="editor"><textarea></textarea></div>
  <div id="canvas-container">
    <div id="wireframe-toggle" class="on" title="Toggle wireframe">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
        <path d="M12 2 L22 8 L22 16 L12 22 L2 16 L2 8 Z" />
        <path d="M12 2 L12 22" />
        <path d="M2 8 L22 8" />
        <path d="M2 16 L22 16" />
        <path d="M2 8 L12 14 L22 8" />
        <path d="M2 16 L12 14 L22 16" />
      </svg>
      <div class="switch"><div class="knob"></div></div>
    </div>
  </div>
  <script type="module" src="src/sketch.ts"></script>
</body>
</html>
